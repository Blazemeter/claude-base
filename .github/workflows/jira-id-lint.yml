name: STANDARDS — JIRA ID lint

# Server-side enforcement for STANDARDS rule 1: every PR must reference a
# JIRA key in the branch name OR the PR title OR the PR body.
#
# Reusable: consumer repos add a thin invoker like
#
#   # .github/workflows/claude-standards.yml
#   name: claude-standards
#   on: pull_request
#   jobs:
#     jira-id:
#       uses: PerfectoMobileDev/claude-base/.github/workflows/jira-id-lint.yml@main
#
# Add the job as a required status check in branch protection to make this
# actually unbypassable.

on:
  workflow_call:
    inputs:
      jira_regex:
        description: 'Regex for matching JIRA keys. Defaults to any uppercase project key.'
        required: false
        type: string
        default: '[A-Z][A-Z0-9_]+-[0-9]+'
      require_in_title:
        description: 'If true, the PR title MUST contain the JIRA key (body alone is not enough).'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  jira-id:
    name: JIRA ID present
    runs-on: ubuntu-latest
    steps:
      - name: Check branch, title, and body for JIRA key
        env:
          JIRA_RE: ${{ inputs.jira_regex }}
          REQUIRE_IN_TITLE: ${{ inputs.require_in_title }}
          BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -eu
          echo "Branch: $BRANCH"
          echo "Title:  $PR_TITLE"

          # All-zero suffixes (MOB-00000, MOB-0, …) match JIRA_RE but point at no
          # real issue — reject them here too so the server check agrees with the
          # client hook (STANDARDS rule 1, "No placeholders").
          PLACEHOLDER_RE='^[A-Z][A-Z0-9_]+-0+$'

          # Prints 1 if the argument contains a *real* (non-placeholder) JIRA key,
          # else 0. The first grep is neutralized with `|| true` so an empty match
          # never trips `set -e`.
          real_match() {
            local keys
            keys="$(printf '%s' "$1" | grep -oE "$JIRA_RE" || true)"
            if [ -n "$keys" ] && printf '%s\n' "$keys" | grep -qvE "$PLACEHOLDER_RE"; then
              echo 1
            else
              echo 0
            fi
          }

          branch_ok=$(real_match "$BRANCH")
          title_ok=$(real_match "$PR_TITLE")
          body_ok=$(real_match "$PR_BODY")

          if [ "$REQUIRE_IN_TITLE" = "true" ] && [ "$title_ok" -eq 0 ]; then
            echo "::error::PR title is missing a real JIRA key (pattern /$JIRA_RE/, all-zero placeholders rejected)."
            echo "Rename the PR to include the JIRA key, e.g. 'MOB-12345: fix foo' (not MOB-00000)."
            exit 1
          fi

          if [ "$((branch_ok + title_ok + body_ok))" -eq 0 ]; then
            echo "::error::No real JIRA key found in branch '$BRANCH', PR title, or PR body."
            echo "A key matching /$JIRA_RE/ must be present and must not be an all-zero placeholder (MOB-00000)."
            echo "Create the task first (Claude-tooling work goes under AIDLC epic MOB-50371), then reference its key."
            echo "See STANDARDS.md in PerfectoMobileDev/claude-base for the policy."
            exit 1
          fi

          echo "OK — real JIRA key present (branch=$branch_ok title=$title_ok body=$body_ok)."
