name: Plugin marketplace validate

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'scripts/**'
      - 'policy/**'
      - '.github/workflows/plugin-validate.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Layer 1 — structural / schema / standards / tool policy / smoke secrets.
  structural:
    name: Structural & standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install validator deps
        run: pip install -r scripts/requirements.txt
      - name: Run regression tests
        run: python -m unittest discover -s scripts/tests -t scripts -v
      - name: Run scripts/validate.py --strict
        run: python scripts/validate.py --strict

  # Layer 2 — SAST on hook scripts (shellcheck + ruff).
  sast:
    name: SAST (hook scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff==0.7.4
      - name: shellcheck on hook .sh files
        # shellcheck is preinstalled on ubuntu-latest runners.
        run: |
          shopt -s globstar nullglob
          files=(plugins/**/hooks/**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no .sh hook scripts to check"
          else
            shellcheck "${files[@]}"
          fi
        shell: bash
      - name: ruff on hook .py files
        run: |
          shopt -s globstar nullglob
          files=(plugins/**/hooks/**/*.py)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no .py hook scripts to check"
          else
            ruff check "${files[@]}"
          fi
        shell: bash

  # Layer 3 — comprehensive secret scanning (history-aware).
  # Install the gitleaks binary directly. The gitleaks-action wrapper requires
  # a paid license for organization repos as of Aug 2023; the binary itself is
  # MIT-licensed and free for any use. https://github.com/gitleaks/gitleaks
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # gitleaks scans history
      - name: Install gitleaks binary
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -eu
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repo + history for secrets
        run: gitleaks detect --source . --redact --no-banner --verbose

  # Layer 4 — Claude Code's own canonical validator.
  claude-cli:
    name: claude plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: claude plugin validate .
        run: claude plugin validate .

  # Layer 5 (opt-in) — behavioral tests against the Anthropic API.
  # Always lints test-case files; only invokes the API if ANTHROPIC_API_KEY
  # is configured as a repo secret.
  behavioral:
    name: Behavioral tests (opt-in)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install lint deps
        run: pip install -r scripts/requirements.txt
      - name: Lint behavioral test cases
        run: python scripts/behavioral_runner.py --lint
      - name: Run behavioral tests (if API key set)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            pip install -r scripts/requirements-eval.txt
            python scripts/behavioral_runner.py
          else
            echo "ANTHROPIC_API_KEY not set — skipping API-driven behavioral tests"
          fi
