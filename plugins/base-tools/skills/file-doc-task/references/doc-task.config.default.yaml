# Documentation-planning task configuration (STANDARDS rule #4).
#
# BUNDLED DEFAULT — this copy ships INSIDE the base-tools plugin so the
# `file-doc-task` skill always resolves a config even when installed as a
# standalone plugin. It is intentionally UNSET.
#
# To actually file tickets, copy this file to `policy/doc-task.yaml` at your
# consuming repo's root and set the real values. The skill prefers that copy
# over this bundled default (see SKILL.md → "Load the config"). Forks of
# claude-base already have `policy/doc-task.yaml` at the repo root.
#
# The skill REFUSES to create a ticket while `project_key` is the unset
# placeholder below — this is deliberate (we never guess a JIRA project).

# --- REQUIRED: set before the skill can file tickets ---------------------
# JIRA project the documentation-planning tickets are created in.
# TODO(doc-team): replace with the real doc project key (e.g. "DOC", "TW").
project_key: "__UNSET__"

# Issue type for the doc-planning ticket.
# TODO(doc-team): confirm with the docs team — Task / Story / Documentation.
issue_type: "Task"

# --- Fixed by the doc-team standard (do not change without docs sign-off) -
# Title prefix — final summary is "<title_prefix><customer-facing feature name>".
title_prefix: "DOC-ready: "

# Label applied to every doc-planning ticket.
label: "ready-for-docs"

# How the doc task is linked back to the engineering ticket.
# TODO(doc-team): confirm preferred link type (relates to / blocks / is blocked by).
link_type: "relates to"

# Optional defaults — leave blank to omit.
component: ""        # e.g. "Documentation"
default_assignee: "" # e.g. a docs-triage account; blank = unassigned/triage queue

# --- Trigger scope (STANDARDS rule #4) -----------------------------------
# The skill only runs the doc-required gate for these change classes.
# Pure refactors / internal fixes / build chores are out of scope.
applies_to:
  - feature
  - user-facing-change

# The gate always asks a human; it never auto-decides that docs are required.
require_human_confirmation: true
