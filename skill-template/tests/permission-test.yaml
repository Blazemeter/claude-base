# Declares the permission tier and the exact Bash patterns the skill may use.
# CI parses Steps in SKILL.md and asserts every bash command matches an allowed
# pattern and none match a denied pattern.

declared_tier: <1|2|3>

allowed_tools:
  - Read
  - Grep
  - Glob

allowed_bash_patterns:
  - "git status*"
  - "gh pr view*"

denied_bash_patterns:
  - "git push --force*"
  - "gh pr merge*"
  - "rm -rf*"
  - "*--no-verify*"
