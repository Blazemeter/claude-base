# Behavioural eval cases for the skill. Promotion to status: stable requires
# >= 3 cases and >= 85% pass rate.
#
# Adversarial cases (prompt-injection, exfiltration, denied-action) live in
# tests/redteam-cases.yaml and are graded separately at a >= 95% gate.

- description: <one-line happy-path scenario>
  vars:
    user_message: "<what the user says>"
  assert:
    - type: llm-rubric
      provider: anthropic:messages:claude-opus-4-7
      value: |
        The response must satisfy:
        - <assertion 1>
        - <assertion 2>
    - type: not-contains
      value: "<forbidden phrase or destructive command>"

- description: <second scenario — typical variation>
  vars:
    user_message: "..."
  assert:
    - type: contains
      value: "<must include phrase>"

- description: <third scenario — edge case the skill must handle>
  vars:
    user_message: "..."
  assert:
    - type: llm-rubric
      provider: anthropic:messages:claude-opus-4-7
      value: |
        The response must:
        - Detect the edge case.
        - Explain why the normal path does not apply.
        - Suggest the correct next step.
